name: Archi-Scan CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npx next build
      
      - name: Run regression tests
        run: npx tsx tests/regression.ts
      
      - name: Test summary
        if: always()
        run: echo "✅ CI/CD pipeline complete"
